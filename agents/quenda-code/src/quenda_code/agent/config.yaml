models:
  default:
    provider: jdcloud
    model: GLM-5
  vision:
    provider: jdcloud
    model: Kimi-K2.5
  routing:
      capability_routing: true
      missing_capability: error

# Instructions to include (relative to agent package)
instructions:
  include:
    - instructions/coding.md
    - instructions/communication.md

tools:
  bundles:
    - core
    - network
    - coding
    - scheduling

skills:
  include_catalog: true

# Theme configuration (ADR-014)
# Uncomment to customize the interface appearance.
# theme:
#   # Use a preset: "default", "minimal", "ascii", "silent"
#   preset: default
#
#   # Or override specific fields (see InterfaceTheme):
#   agent_icon: "🤖"
#   success_icon: "✓"
#   error_icon: "❌"
#   show_duration: true
#   spinner_frames: ["⠋", "⠙", "⠹", "⠸", "⠼", "⠴", "⠦", "⠧", "⠇", "⠏"]
theme:
  agent_icon: "🐾"

# MCP servers (optional)
mcp:
  servers:
    calculator:
      transport: stdio
      command: python
      args:
        - "/Users/xushiting/Workspace/quenda/examples/mcp/calculator_server.py"

