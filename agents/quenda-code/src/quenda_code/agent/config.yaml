models:
  default:
    provider: jdcloud
    model: GLM-5
  vision:
    provider: jdcloud
    model: Kimi-K2.5
  routing:
      capability_routing: true
      missing_capability: error

# Instructions to include (relative to agent package)
instructions:
  include:
    - instructions/coding.md
    - instructions/communication.md

tools:
  bundles:
    - core
    - network

skills:
  include_catalog: true

compression:
  enabled: true
  threshold_ratio: 0.7
  keep_last_n_messages: 10
  archive_raw_messages: true

policies:
  tool_result_processing:
    type: context_safe
    max_chars: 16000

# Theme configuration (ADR-014)
# Uncomment to customize the interface appearance.
# theme:
#   # Use a preset: "default", "minimal", "ascii", "silent"
#   preset: default
#
#   # Or override specific fields (see InterfaceTheme):
#   agent_icon: "🤖"
#   success_icon: "✓"
#   error_icon: "❌"
#   show_duration: true
#   spinner_frames: ["⠋", "⠙", "⠹", "⠸", "⠼", "⠴", "⠦", "⠧", "⠇", "⠏"]
theme:
  agent_icon: "🐾"

